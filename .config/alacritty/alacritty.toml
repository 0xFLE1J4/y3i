# Alacritty configuration - mise à jour moderne


live_config_reload = true
[env]
TERM = "xterm-256color"

[window]
decorations = "full"
dynamic_padding = true
opacity = 0.9
title = "Alacritty"
dynamic_title = true

[window.dimensions]
columns = 0
lines = 0

[window.padding]
x = 12
y = 12

[scrolling]
history = 10000
multiplier = 3

[font]
size = 8

[font.normal]
family = "Iosevka Nerd Font"
style = "Regular"

[font.bold]
family = "Iosevka Nerd Font"
style = "Bold"

[font.italic]
family = "Iosevka Nerd Font"
style = "Italic"

[font.bold_italic]
family = "Iosevka Nerd Font"
style = "Bold Italic"

[font.offset]
x = 1
y = 0

[font.glyph_offset]
x = 0
y = 0

[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "0x000000"
foreground = "0xeaeaea"

[colors.normal]
black   = "0x000000"
red     = "0xd54e53"
green   = "0xb9ca4a"
yellow  = "0xe6c547"
blue    = "0x7aa6da"
magenta = "0xc397d8"
cyan    = "0x70c0ba"
white   = "0xeaeaea"

[colors.bright]
black   = "0x666666"
red     = "0xff3334"
green   = "0x9ec400"
yellow  = "0xe7c547"
blue    = "0x7aa6da"
magenta = "0xb77ee0"
cyan    = "0x54ced6"
white   = "0xffffff"

[cursor]
style = { shape = "Block", blinking = "Off" }
unfocused_hollow = true

[selection]
save_to_clipboard = false
semantic_escape_chars = ",│`|:\"' ()[]{}<>"

[mouse]
hide_when_typing = false

[[mouse.bindings]]
mouse = "Middle"
action = "PasteSelection"

# Hints (URLs cliquables avec Ctrl+Shift+U)
[[hints.enabled]]
command = "xdg-open"
post_processing = true
mouse.enabled = true
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key = "U"
mods = "Control|Shift"

